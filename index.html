    <style>
      .site-loader {
        position: fixed;
        inset: 0;
        z-index: 2147483000;
        display: grid;
        place-items: center;
        background: #000;
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transition: opacity 720ms cubic-bezier(0.16, 1, 0.3, 1), visibility 0s linear 720ms;
      }

      .site-loader.is-leaving {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .site-loader__frame {
        position: relative;
        width: clamp(360px, 40vw, 720px);
        aspect-ratio: 16 / 9;
        overflow: hidden;
        display: grid;
        place-items: center;
        background: #000;
      }

      .site-loader__video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        pointer-events: none;
        transform: none;
        background: #000;
      }

      .site-loader__frame::before,
      .site-loader__frame::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        z-index: 2;
        height: 16%;
        pointer-events: none;
      }

      .site-loader__frame::before {
        top: 0;
        background: linear-gradient(to bottom, #000 0%, rgba(0, 0, 0, 0.85) 28%, rgba(0, 0, 0, 0) 100%);
      }

      .site-loader__frame::after {
        bottom: 0;
        background: linear-gradient(to top, #000 0%, rgba(0, 0, 0, 0.85) 28%, rgba(0, 0, 0, 0) 100%);
      }

      .site-loader__watermark-patch {
        position: absolute;
        left: 0;
        bottom: 0;
        z-index: 3;
        width: clamp(130px, 16vw, 240px);
        height: clamp(20px, 2.5vw, 38px);
        background: #000;
        pointer-events: none;
      }

      @media (max-width: 768px) {
        .site-loader__frame {
          width: clamp(280px, 82vw, 460px);
        }

        .site-loader__frame::before,
        .site-loader__frame::after {
          height: 14%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .site-loader {
          transition-duration: 260ms;
          transition-delay: 0s;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="site-loader" data-site-loader>
        <div class="site-loader__frame">
          <video class="site-loader__video" src="/assets/athaya-loader.mp4" autoplay muted playsinline loop preload="auto" aria-hidden="true"></video>
          <span class="site-loader__watermark-patch" aria-hidden="true"></span>
        </div>
      </div>
    </div>
    <script>
      window.addEventListener("error", function (event) {
        var root = document.getElementById("root");
        if (!root || root.dataset.appReady === "true") return;
        root.innerHTML =
          '<main style="min-height:100vh;background:#050505;color:#f3eee7;font-family:Arial,sans-serif;display:grid;place-items:center;padding:32px;text-align:center"><div><p style="font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#d8d8d8;margin:0 0 16px">ATHAYA DESIGNED</p><h1 style="font-size:48px;line-height:.95;margin:0 0 16px;text-transform:uppercase">JavaScript Error</h1><p style="max-width:720px;color:#a49d93;margin:0 auto">' +
          String(event.message || "Unknown error") +
          "</p></div></main>";
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
